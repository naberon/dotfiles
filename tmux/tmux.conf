# ------------------------
# Color
# https://gist.github.com/andersevenrud/015e61af2fd264371032763d4ed965b6
# ------------------------
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
# Or use a wildcard instead of forcing a default mode.
# Some users in the comments of this gist have reported that this work better.
#set -sg terminal-overrides ",*:RGB"

# You can also use the env variable set from the terminal.
# Useful if you share your configuration betweeen systems with a varying value.
#set -ag terminal-overrides ",$TERM:RGB"

# すべてのベル（音）を無効にする
set -g bell-action none
# 視覚的なベル通知（画面のフラッシュなど）もオフにする
set -g visual-bell off

# vim エスケープ遅い問題
set -g escape-time 10

set-window-option -g mode-keys vi

set -g mouse on
bind-key -T edit-mode-vi WheelUpPane send-keys -X scroll-up
bind-key -T edit-mode-vi WheelDownPane send-keys -X scroll-down


#####################################
#  key bind
#####################################

# デフォルトのprefixキーC-bを解除する
unbind C-b
# prefixキーをC-jに変更する
set -g prefix C-j


# reload setting
unbind ^r
bind ^r source-file ~/.config/tmux/tmux.conf \; display "reload .tmux.conf"
unbind r
bind r source-file ~/.config/tmux/tmux.conf \; display "reload .tmux.conf"

# create
unbind ^c
bind ^c new-window
unbind c
bind c new-window

# next ^N n
unbind ^n
bind ^n next-window
unbind n
bind n next-window

# prev
unbind ^p
bind ^p previous-window
unbind p
bind p previous-window

# ペイン操作
# "|" でペインを縦分割する
bind | split-window -h
# "-" でペインを縦分割する
bind - split-window -v
# vimのキーバインドでペインを移動する
bind h select-pane -L
bind ^h select-pane -L
bind j select-pane -D
bind ^j select-pane -D
bind k select-pane -U
bind ^k select-pane -U
bind l select-pane -R
bind ^l select-pane -R

bind-key -n M-Left resize-pane -L 3
bind-key -n M-Right resize-pane -R 3
bind-key -n M-Up resize-pane -U 3
bind-key -n M-Down resize-pane -D 3

set-option -g focus-events on
set -g status-interval 1      # ステータスバーの更新間隔 (秒)
set -g base-index 1 # start windows numbering at 1

# window-status のフォーマットを指定する。
set-window-option -g window-status-format " #I: #W "

# status-left の最大の長さを指定する。
set-option -g status-left-length 20

# status-left のフォーマットを指定する。
#set-option -g status-left "#[fg=colour255,bg=colour241]Session: #S #[default]"
set-option -g status-left ""

# status-right の最大の長さを指定する。
set-option -g status-right-length 70

# status line の背景色と文字色（全体）
set-option -g status-bg "colour238"  # 暗いグレー
set-option -g status-fg "colour255"

# status-right のフォーマットを指定する。
set-option -g status-right "#[fg=colour255,bg=colour241] Load Avg: #(cut -d' ' -f-3 /proc/loadavg) #[default]"

# 選択されていない（非アクティブ）タブの設定: グレー
set-window-option -g window-status-format "#[fg=colour245,bg=colour238] #I: #{?#{m:#W,zsh},#(basename #{pane_current_path}),#W} "

# 現在選択されている（アクティブ）タブの設定: 青背景に白文字で強調
set-window-option -g window-status-current-format "#[fg=colour255,bg=colour27,bold] #I: #W "
set-window-option -g window-status-current-format "#[fg=colour255,bg=colour27,bold] #I: #{?#{m:#W,zsh},#(basename #{pane_current_path}),#W} "

setw -g monitor-activity on
setw -g visual-activity off

# 更新があった時（gok成功時など）の色設定: 緑背景
# ※一度ウィンドウを見るとこの色は消え、元のグレーに戻ります
set-window-option -g window-status-activity-style bg=colour28,fg=colour255,bold

###########ペイン

# アクティブなペインの枠の色（例：明るい青）
set -g pane-active-border-style fg=colour27,bg=default

# 非アクティブなペインの枠の色（例：暗めのグレー）
set -g pane-border-style fg=colour240
